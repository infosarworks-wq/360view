<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArchViz Viewer — SAR Works</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#0a0a0a;--dark:#111;--mid:#1c1c1c;--border:#2a2a2a;
  --accent:#FF2026;--white:#f0ede8;--muted:#777;--red:#c0392b;
  --font-ui:Courier,monospace;
}
html,body{width:100%;height:100%;background:var(--black);color:var(--white);font-family:var(--font-ui);overflow:hidden;user-select:none;-webkit-touch-callout:none;-webkit-user-select:none;}
img{-webkit-touch-callout:none;pointer-events:auto;}

/* LOADING */
#loading-screen{position:fixed;inset:0;background:var(--black);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity 0.8s ease;}
#loading-screen.hidden{opacity:0;pointer-events:none;}
.loader-logo{font-family:var(--font-ui);font-size:2.4rem;font-weight:300;letter-spacing:0.35em;color:var(--accent);margin-bottom:0.25rem;}
.loader-sub{font-size:0.7rem;letter-spacing:0.3em;color:var(--muted);margin-bottom:3rem;}
.loader-bar-wrap{width:200px;height:1px;background:var(--border);position:relative;overflow:hidden;}
.loader-bar{height:100%;background:var(--accent);width:0%;transition:width 0.5s ease;}
.loader-status{margin-top:1rem;font-size:0.65rem;letter-spacing:0.2em;color:var(--muted);}

/* ERROR */
#error-screen{position:fixed;inset:0;background:var(--black);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:999;}
#error-screen.visible{display:flex;}
.error-title{font-family:var(--font-ui);font-size:3.5rem;font-weight:300;color:var(--red);letter-spacing:0.1em;margin-bottom:1rem;}
.error-sub{font-size:0.8rem;letter-spacing:0.25em;color:var(--muted);}

/* APP */
#app{width:100%;height:100%;opacity:0;transition:opacity 0.8s ease;}
#app.visible{opacity:1;}

/* TOPBAR */
#topbar{position:fixed;top:0;left:0;right:0;height:60px;background:linear-gradient(180deg,rgba(10,10,10,0.97) 0%,transparent 100%);display:flex;align-items:center;padding:0 28px;z-index:100;gap:16px;}
.brand{flex:1;display:flex;align-items:center;}
.brand img{height:32px;object-fit:contain;}
.project-name-display{font-size:0.7rem;letter-spacing:0.2em;color:var(--muted);}

#floor-selector{display:none;align-items:center;gap:10px;}
#floor-selector.visible{display:flex;}
#floor-selector label{font-size:0.65rem;letter-spacing:0.2em;color:var(--muted);}
#floor-select{background:rgba(28,28,28,0.9);border:1px solid var(--border);color:var(--white);font-family:var(--font-ui);font-size:0.78rem;padding:5px 12px;cursor:pointer;outline:none;letter-spacing:0.1em;transition:border-color 0.2s;}
#floor-select:hover{border-color:var(--accent);}


#back-btn{display:none;align-items:center;gap:8px;background:none;border:1px solid var(--border);color:var(--white);font-family:var(--font-ui);font-size:0.72rem;letter-spacing:0.18em;padding:6px 18px;cursor:pointer;transition:border-color 0.2s,color 0.2s;}
#back-btn:hover{border-color:var(--accent);color:var(--accent);}
#back-btn.visible{display:flex;}
/* Interior: Aerial View button above minimap (desktop + phone same) */
body.interior-active #back-btn.visible{position:fixed;right:24px;bottom:237px;left:auto;top:auto;z-index:221;background:rgba(10,10,10,0.95);padding:8px 16px;box-shadow:0 4px 20px rgba(0,0,0,0.5);}
body.interior-active.minimap-collapsed #back-btn.visible{bottom:72px;}

/* AERIAL */
#aerial-view{position:fixed;inset:0;background:var(--black);cursor:grab;overflow:hidden;}
#aerial-view:active{cursor:grabbing;}
#aerial-view.hidden{display:none;}
#aerial-zoom-wrap{position:absolute;inset:0;overflow:hidden;transform-origin:center center;}
#aerial-zoom-wrap .pan-mode{cursor:move;}
#aerial-img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;display:block;transition:none;}
/* Pan mode: keep contain so image fills wrap when zoomed; black areas were from object-fit:none */
#aerial-img.pan-mode{object-fit:contain;}

#hotspot-layer{position:absolute;inset:0;pointer-events:none;}
.hs-btn{position:absolute;width:52px;height:52px;transform:translate(-50%,-50%);cursor:pointer;pointer-events:all;transition:transform 0.2s;border-radius:50%;overflow:hidden;background:none;}
.hs-btn:hover{transform:translate(-50%,-50%) scale(1.2);}
.hs-btn img,.hs-btn svg{width:100%;height:100%;filter:drop-shadow(0 0 10px rgba(50,200,50,0.5));transition:filter 0.2s;}
.hs-btn:hover img,.hs-btn:hover svg{filter:drop-shadow(0 0 18px rgba(50,220,50,0.9));}
.hs-tooltip{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:rgba(10,10,10,0.92);border:1px solid var(--border);color:var(--white);font-size:0.65rem;letter-spacing:0.15em;padding:4px 10px;white-space:nowrap;opacity:0;transition:opacity 0.2s;pointer-events:none;}
.hs-btn:hover .hs-tooltip{opacity:1;}

/* Row dots (disabled) */
#row-dots{display:none;}
.rdot{display:none;}

/* Zoom indicator */
#zoom-bar{position:fixed;top:68px;left:50%;transform:translateX(-50%);display:none;align-items:center;gap:16px;z-index:80;}
#zoom-bar.visible{display:flex;}
.zoom-badge{background:rgba(255,32,38,0.12);border:1px solid var(--accent);color:var(--accent);font-size:0.65rem;letter-spacing:0.25em;padding:5px 16px;}
#exit-zoom{background:none;border:1px solid var(--border);color:var(--muted);font-family:var(--font-ui);font-size:0.65rem;letter-spacing:0.2em;padding:5px 16px;cursor:pointer;transition:border-color 0.2s,color 0.2s;}
#exit-zoom:hover{border-color:var(--accent);color:var(--accent);}

/* Hint */
#hint{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);font-size:0.62rem;letter-spacing:0.25em;color:var(--muted);pointer-events:none;transition:opacity 1s ease;}
#hint.gone{opacity:0;}

/* MAP VIEW */
#map-view{position:fixed;inset:0;display:none;background:var(--black);}
#map-view.visible{display:block;}
#map-img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;display:block;}
#map-hotspot-layer{position:absolute;inset:0;pointer-events:none;}
.map-hs{position:absolute;width:20px;height:20px;transform:translate(-50%,-50%);cursor:pointer;pointer-events:all;}
.map-hs img,.map-hs svg{width:100%;height:100%;filter:drop-shadow(0 0 8px rgba(50,200,50,0.6));}

/* MINI MAP — shown on aerial and interior; can be collapsed to a restore bar */
#mini-map{position:fixed;right:24px;bottom:24px;width:364px;height:205px;border:1px solid var(--border);background:rgba(10,10,10,0.92);opacity:0.75;display:none;z-index:220;overflow:hidden;}
#mini-map.visible{display:block;}
#mini-map.minimap-collapsed{height:40px;}
#mini-map.minimap-collapsed #mini-map-content,
#mini-map.minimap-collapsed #mini-map-hide-bar{display:none !important;}
#mini-map.minimap-collapsed #mini-map-restore-bar{display:flex !important;}
#mini-map-restore-bar{display:none;align-items:center;justify-content:center;gap:8px;width:100%;height:100%;border:none;background:rgba(10,10,10,0.92);color:var(--white);font-family:var(--font-ui);font-size:0.72rem;letter-spacing:0.15em;cursor:pointer;}
#mini-map-restore-bar:hover{background:rgba(28,28,28,0.95);color:var(--accent);}
#mini-map-hide-bar{position:absolute;top:0;left:0;right:0;height:32px;z-index:25;display:flex;align-items:center;justify-content:center;border:none;background:rgba(0,0,0,0.65);color:var(--white);cursor:pointer;transition:background 0.2s;}
#mini-map-hide-bar:hover{background:rgba(0,0,0,0.85);}
#mini-map-hide-bar svg{width:20px;height:20px;}
#mini-map-content{position:absolute;inset:0;width:100%;height:100%;}
#mini-map-img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;z-index:1;}
#mini-map-hotspots{position:absolute;inset:0;z-index:10;pointer-events:none;visibility:visible;opacity:1;}
#mini-map-hotspots .mini-hs{pointer-events:auto;}
.mini-hs{position:absolute;width:26px;height:26px;transform:translate(-50%,-50%);cursor:pointer;z-index:2;}
.mini-hs svg{width:100%;height:100%;filter:drop-shadow(0 0 6px rgba(50,200,50,0.8));display:block;}
#mini-map-fov{position:absolute;width:56px;height:56px;z-index:5;pointer-events:none;transform-origin:100% 50%;}
#mini-map-fov svg{width:100%;height:100%;display:block;}
#mini-map-expand{position:absolute;bottom:6px;right:6px;width:32px;height:32px;z-index:20;border:none;background:rgba(0,0,0,0.6);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--white);transition:background 0.2s;}
#mini-map-expand:hover{background:rgba(0,0,0,0.85);}
#mini-map-expand svg{width:18px;height:18px;}
#mini-map-restore-bar svg{width:20px;height:20px;flex-shrink:0;}

/* INTERIOR */
#interior-view{position:fixed;inset:0;display:none;}
#interior-view.visible{display:block;}
#pannellum-container{width:100%;height:100%;}

/* Room label */
#room-label{position:fixed;top:68px;left:50%;transform:translateX(-50%);font-family:var(--font-ui);font-size:1.5rem;font-weight:300;letter-spacing:0.35em;color:var(--white);pointer-events:none;opacity:0;transition:opacity 0.5s ease;text-shadow:0 2px 20px rgba(0,0,0,0.8);}
#room-label.visible{opacity:1;}

/* Version tabs */
#version-tabs{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);display:none;align-items:center;border:1px solid var(--border);overflow:hidden;z-index:200;}
#version-tabs.visible{display:flex;}
.vtab{background:rgba(10,10,10,0.88);border:none;border-right:1px solid var(--border);color:var(--muted);font-family:var(--font-ui);font-size:0.68rem;letter-spacing:0.18em;padding:8px 20px;cursor:pointer;transition:background 0.2s,color 0.2s;}
.vtab:last-child{border-right:none;}
.vtab:hover{background:var(--mid);color:var(--white);}
.vtab.active{background:var(--accent);color:var(--black);}

/* Logo overlay */
#logo-overlay{position:fixed;pointer-events:none;opacity:0;transition:opacity 0.7s ease;z-index:300;border-radius:50%;overflow:hidden;transform:translate(-50%,-50%);}
#logo-overlay.visible{opacity:0.88;}
#logo-overlay img{width:100%;height:100%;object-fit:contain;}

/* Transition */
#fade{position:fixed;inset:0;background:var(--black);opacity:0;pointer-events:none;z-index:600;transition:opacity 0.35s ease;}
#fade.on{opacity:1;pointer-events:all;}

/* Tutorial overlay — dim 50%, show once; text centered, arrow to highlight */
#tutorial-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:400;display:none;align-items:center;justify-content:center;padding:20px;box-sizing:border-box;}
#tutorial-overlay.visible{display:flex;flex-direction:column;align-items:center;justify-content:center;}
#tutorial-overlay .tutorial-text{max-width:340px;text-align:center;font-size:0.95rem;letter-spacing:0.08em;color:#fff;line-height:1.5;margin-bottom:14px;text-shadow:0 0 20px rgba(255,255,255,0.4),0 2px 8px rgba(0,0,0,0.9);font-weight:500;}
#tutorial-overlay .tutorial-skip{background:rgba(28,28,28,0.95);border:1px solid var(--border);color:var(--muted);font-family:var(--font-ui);font-size:0.7rem;letter-spacing:0.2em;padding:6px 14px;cursor:pointer;transition:border-color 0.2s,color 0.2s;}
#tutorial-overlay .tutorial-skip:hover{border-color:var(--accent);color:var(--accent);}
#tutorial-arrow{position:fixed;inset:0;pointer-events:none;z-index:399;display:none;}
#tutorial-arrow line{stroke:var(--white);stroke-width:2;stroke-linecap:round;}
#tutorial-arrow polygon{fill:var(--white);}
.tutorial-highlight{z-index:401 !important;box-shadow:0 0 0 4px var(--accent);border-radius:2px;}

/* Custom pannellum hotspot arrows */
.pnlm-container .nav-arrow-hs{
  width:50px;height:50px;
  background:none;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.nav-arrow-hs svg{
  width:40px;height:40px;
  filter:drop-shadow(0 2px 8px rgba(0,0,0,0.9));
  transition:transform 0.2s;
}
.nav-arrow-hs:hover svg{transform:scale(1.2);}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen">
  <div class="loader-logo">SAR WORKS</div>
  <div class="loader-sub">Property Visualization</div>
  <div class="loader-bar-wrap"><div class="loader-bar" id="loader-bar"></div></div>
  <div class="loader-status" id="loader-status">Initializing</div>
</div>

<!-- ERROR -->
<div id="error-screen">
  <div class="error-title">Not Found</div>
  <div class="error-sub">Project not found.</div>
</div>

<!-- APP -->
<div id="app">

  <!-- TOPBAR -->
  <div id="topbar">
    <div class="brand"><img id="brand-logo" alt="SAR Works" draggable="false"></div>
    <div class="project-name-display" id="project-label"></div>
    <div id="floor-selector">
      <label for="floor-select">Floor</label>
      <select id="floor-select"></select>
    </div>
    <button id="back-btn" onclick="goBackToAerial()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="15 18 9 12 15 6"/></svg>
      Aerial View
    </button>
  </div>

  <!-- AERIAL VIEW -->
  <div id="aerial-view">
    <div id="aerial-zoom-wrap">
      <img id="aerial-img" src="" alt="" draggable="false">
    </div>
    <div id="hotspot-layer"></div>
    <div id="row-dots"></div>
    <div id="zoom-bar">
      <div class="zoom-badge">3× — Pan Mode</div>
      <button id="exit-zoom" onclick="exitZoom()">Exit Zoom</button>
    </div>
    <div id="hint">Double-click to zoom &nbsp;·&nbsp; Scroll or pinch 1–5× &nbsp;·&nbsp; Drag to rotate</div>
  </div>

  <!-- INTERIOR VIEW -->
  <div id="interior-view">
    <div id="pannellum-container"></div>
    <div id="room-label"></div>
    <div id="version-tabs"></div>
  </div>

  <!-- MAP VIEW -->
  <div id="map-view">
    <img id="map-img" src="" alt="" draggable="false">
    <div id="map-hotspot-layer"></div>
  </div>

  <!-- MINI MAP: shown on aerial and interior; hide bar on top, restore bar when collapsed -->
  <div id="mini-map">
    <button type="button" id="mini-map-hide-bar" title="Hide minimap" aria-label="Hide minimap" onclick="setMinimapCollapsed(true)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <button type="button" id="mini-map-restore-bar" title="Show minimap" aria-label="Show minimap" onclick="setMinimapCollapsed(false)">
      <span>Minimap</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
    </button>
    <div id="mini-map-content">
      <img id="mini-map-img" src="" alt="" draggable="false">
      <div id="mini-map-fov"></div>
      <div id="mini-map-hotspots"></div>
      <button type="button" id="mini-map-expand" title="View full map" aria-label="View full map" onclick="openRooms()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="1"/><line x1="2" y1="8" x2="22" y2="8"/><line x1="2" y1="14" x2="22" y2="14"/><line x1="8" y1="2" x2="8" y2="22"/><line x1="14" y1="2" x2="14" y2="22"/></svg>
      </button>
    </div>
  </div>

  <!-- LOGO OVERLAY -->
  <div id="logo-overlay"><img id="logo-img" src="" alt="SAR Works" draggable="false"></div>

</div>

<!-- FADE TRANSITION -->
<div id="fade"></div>

<!-- TUTORIAL (exterior + interior, show once) -->
<svg id="tutorial-arrow" aria-hidden="true"><defs><marker id="tutorial-arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0 0, 10 4, 0 8"/></marker></defs><line x1="0" y1="0" x2="0" y2="0" marker-end="url(#tutorial-arrowhead)"/></svg>
<div id="tutorial-overlay">
  <p class="tutorial-text" id="tutorial-text"></p>
  <button type="button" class="tutorial-skip" id="tutorial-skip">Skip</button>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const BUCKET_BASE = 'https://storage.googleapis.com/archviz-viewer-images';
const COLS = 24;
const ROWS = 5;
const TOTAL_IMAGES = 120;

// Hotspot icon: green circle with white dot in the middle (inline SVG)
function createEyeIcon() {
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('viewBox', '0 0 24 24');
  svg.setAttribute('width', '24');
  svg.setAttribute('height', '24');
  svg.setAttribute('aria-hidden', 'true');
  const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  circle.setAttribute('cx', '12');
  circle.setAttribute('cy', '12');
  circle.setAttribute('r', '11');
  circle.setAttribute('fill', '#22a522');
  circle.setAttribute('stroke', 'rgba(0,0,0,0.2)');
  circle.setAttribute('stroke-width', '1');
  svg.appendChild(circle);
  const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  dot.setAttribute('cx', '12');
  dot.setAttribute('cy', '12');
  dot.setAttribute('r', '3');
  dot.setAttribute('fill', 'white');
  svg.appendChild(dot);
  return svg;
}

// Rotation indicator: green wedge, simple 100% at base to 0% at tip
function createFovRaySvg() {
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('viewBox', '0 0 56 56');
  svg.setAttribute('width', '56');
  svg.setAttribute('height', '56');
  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  const greenFull = 'rgba(34,165,34,1)';
  const greenTrans = 'rgba(34,165,34,0)';
  const fillGrad = document.createElementNS('http://www.w3.org/2000/svg', 'linearGradient');
  fillGrad.setAttribute('id', 'fov-ray-gradient');
  fillGrad.setAttribute('x1', '0%'); fillGrad.setAttribute('y1', '50%');
  fillGrad.setAttribute('x2', '100%'); fillGrad.setAttribute('y2', '50%');
  [{o:'0%',c:greenTrans},{o:'100%',c:greenFull}].forEach(s=>{
    const stop = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
    stop.setAttribute('offset', s.o); stop.setAttribute('stop-color', s.c);
    fillGrad.appendChild(stop);
  });
  defs.appendChild(fillGrad);
  const strokeGrad = document.createElementNS('http://www.w3.org/2000/svg', 'linearGradient');
  strokeGrad.setAttribute('id', 'fov-ray-stroke-gradient');
  strokeGrad.setAttribute('x1', '0%'); strokeGrad.setAttribute('y1', '50%');
  strokeGrad.setAttribute('x2', '100%'); strokeGrad.setAttribute('y2', '50%');
  [{o:'0%',c:greenTrans},{o:'100%',c:greenFull}].forEach(s=>{
    const stop = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
    stop.setAttribute('offset', s.o); stop.setAttribute('stop-color', s.c);
    strokeGrad.appendChild(stop);
  });
  defs.appendChild(strokeGrad);
  svg.appendChild(defs);
  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('d', 'M 56 28 L 8 4 L 8 52 Z');
  path.setAttribute('fill', 'url(#fov-ray-gradient)');
  path.setAttribute('stroke', 'url(#fov-ray-stroke-gradient)');
  path.setAttribute('stroke-width', '2');
  path.setAttribute('stroke-linejoin', 'round');
  svg.appendChild(path);
  return svg;

// ============================================================
// UTILS
// ============================================================
function imgIndex(row, col) {
  // row: 0-indexed, col: 0-indexed
  return row * COLS + col + 1;
}
function imgFilename(idx) {
  // Current bucket uses 1.jpg ... 120.jpg naming
  return String(idx) + '.jpg';
}
function bucketUrl(path) {
  return `${BUCKET_BASE}/${path}`;
}
function setLoader(pct, status) {
  document.getElementById('loader-bar').style.width = pct + '%';
  document.getElementById('loader-status').textContent = status;
}
function fadeTransition(cb) {
  const f = document.getElementById('fade');
  f.classList.add('on');
  setTimeout(() => { cb(); f.classList.remove('on'); }, 380);
}

// ============================================================
// BOOT
// ============================================================
// Prevent right-click and long-press context menu so bucket image URLs are never exposed
document.addEventListener('contextmenu', e => e.preventDefault());
window.addEventListener('DOMContentLoaded', async () => {
  // Set logo
  document.getElementById('logo-img').src = LOGO_SRC;
  const brand = document.getElementById('brand-logo');
  if (brand) brand.src = LOGO_SRC;

  const params = new URLSearchParams(window.location.search);
  projectName = (params.get('project') || '').trim();

  if (!projectName) { showError('missing'); return; }

  document.getElementById('project-label').textContent = projectName.replace(/_/g,' ');

  setLoader(10, 'Locating project');

  // Load only floor1 metadata from floor folder (no project.json, no floor2+)
  const ok = await loadFloorMeta('floor1');
  if (!ok) { showError('load'); return; }
  currentFloor = 'floor1';
  setLoader(70, 'Building interface');
  buildFloorSelector();
  buildRowDots();
  await showFloor(currentFloor);
  setLoader(75, 'Preloading exterior views');
  await preloadAerialImages();
  setLoader(100, 'Ready');
  setTimeout(() => {
    document.getElementById('loading-screen').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    if (!localStorage.getItem(TUTORIAL_EXTERIOR_KEY)) startExteriorTutorial();
  }, 600);

  // Hide hint after 5s
  hintTimer = setTimeout(() => {
    document.getElementById('hint').classList.add('gone');
  }, 5000);
});

function showError(reason) {
  document.getElementById('loading-screen').classList.add('hidden');
  const errEl = document.getElementById('error-screen');
  const subEl = errEl.querySelector('.error-sub');
  if (subEl) {
    if (reason === 'missing') subEl.textContent = 'Project not found.';
    else if (reason === 'load') subEl.textContent = 'Metadata not found.';
    else subEl.textContent = 'Project not found.';
  }
  errEl.classList.add('visible');
}

// ============================================================
// TUTORIAL (exterior 3 steps, interior 1 step; show once via localStorage)
// ============================================================
let exteriorTutorialStep = 0;
const EXTERIOR_STEPS = [
  { text: 'Drag to rotate and pinch/scroll to zoom', highlight: null },
  { text: 'Access interior view by selecting the hotspots on the minimap', highlight: 'mini-map' },
  { text: 'Hide minimap', highlight: 'mini-map-hide-bar' }
];

function updateTutorialArrow(highlightId) {
  const arrowSvg = document.getElementById('tutorial-arrow');
  const line = arrowSvg.querySelector('line');
  if (!highlightId) {
    arrowSvg.style.display = 'none';
    return;
  }
  const el = document.getElementById(highlightId);
  if (!el) { arrowSvg.style.display = 'none'; return; }
  const r = el.getBoundingClientRect();
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const tx = r.left + r.width / 2;
  const ty = r.top + r.height / 2;
  arrowSvg.setAttribute('viewBox', '0 0 ' + window.innerWidth + ' ' + window.innerHeight);
  arrowSvg.setAttribute('width', '100%');
  arrowSvg.setAttribute('height', '100%');
  arrowSvg.setAttribute('preserveAspectRatio', 'none');
  line.setAttribute('x1', cx);
  line.setAttribute('y1', cy);
  line.setAttribute('x2', tx);
  line.setAttribute('y2', ty);
  arrowSvg.style.display = 'block';
}

function startExteriorTutorial() {
  exteriorTutorialStep = 0;
  document.querySelectorAll('.tutorial-highlight').forEach(el => el.classList.remove('tutorial-highlight'));
  const overlay = document.getElementById('tutorial-overlay');
  const textEl = document.getElementById('tutorial-text');
  const skipEl = document.getElementById('tutorial-skip');
  overlay.classList.add('visible');
  overlay.onclick = advanceExteriorTutorial;
  skipEl.onclick = (e) => { e.stopPropagation(); advanceExteriorTutorial(); };
  textEl.textContent = EXTERIOR_STEPS[0].text;
  updateTutorialArrow(null);
}

function advanceExteriorTutorial() {
  document.querySelectorAll('.tutorial-highlight').forEach(el => el.classList.remove('tutorial-highlight'));
  exteriorTutorialStep++;
  if (exteriorTutorialStep >= EXTERIOR_STEPS.length) {
    document.getElementById('tutorial-overlay').classList.remove('visible');
    document.getElementById('tutorial-overlay').onclick = null;
    document.getElementById('tutorial-arrow').style.display = 'none';
    localStorage.setItem(TUTORIAL_EXTERIOR_KEY, '1');
    return;
  }
  const step = EXTERIOR_STEPS[exteriorTutorialStep];
  document.getElementById('tutorial-text').textContent = step.text;
  if (step.highlight) {
    const el = document.getElementById(step.highlight);

  } else {

}

// ============================================================
// FLOOR DISCOVERY (supports arbitrary floor keys via project.json or floor1, floor2...)
// ============================================================
async function loadFloorMeta(floorKey) {
  const url = bucketUrl(`${projectName}/${floorKey}/${floorKey}_metadata.json`);
  try {
    const r = await fetch(url);
    if (!r.ok) return false;
    floorData[floorKey] = await r.json();
    return true;
  } catch(e) { return false; }
}

function buildFloorSelector() {
  const keys = Object.keys(floorData);
  if (keys.length === 0) return;
  const sel = document.getElementById('floor-select');
  sel.innerHTML = '';
  keys.forEach(k => {
    const meta = floorData[k];
    const opt = document.createElement('option');
    opt.value = k;
    opt.textContent = (meta && meta.floor_name) ? meta.floor_name : k;
    sel.appendChild(opt);
  });
  document.getElementById('floor-selector').classList.add('visible');
  sel.value = currentFloor;
  sel.addEventListener('change', () => {
    fadeTransition(() => showFloor(sel.value));
  });
}

// FLOOR DISPLAY
// ============================================================
async function showFloor(floorKey) {
  const meta = floorData[floorKey];
  if (!meta) return;
  currentFloor = floorKey;
  currentMeta  = meta;
  currentRow   = 0;
  currentImg   = 1;
  zoomLevel    = 1;
  panOffsetX   = 0;
  panOffsetY   = 0;
  document.getElementById('zoom-bar').classList.remove('visible');
  document.getElementById('aerial-img').classList.remove('pan-mode');
  applyZoomPan();

  const sel = document.getElementById('floor-select');
  if (sel) sel.value = floorKey;

  logoConfig = null;

// AERIAL VIEW

function showAerialView() {

  stopGazeMonitor();

function getAerialPath(idx, hiRes) {
  // Preferred: 120-image exterior sprite, either from metadata or convention
  const av = currentMeta && currentMeta.aerial_view;
  if (av && (av.low_res_path || av.high_res_path)) {
    const base = hiRes
      ? (av.high_res_path || av.low_res_path)
      : (av.low_res_path || av.high_res_path);
    return bucketUrl(base + imgFilename(idx));
  }
  // Conventional layout: PROJECT/floorX/aerial_view/low_res|high_res/0001.png
  const derivedBase = `${projectName}/${currentFloor}/aerial_view/${hiRes ? 'high_res' : 'low_res'}/`;
  return bucketUrl(derivedBase + imgFilename(idx));
}

function loadAerialImage(idx, hiRes = false) {
  const img = document.getElementById('aerial-img');
  const src = getAerialPath(idx, hiRes);

  if (hiRes && zoomCache[idx]) {
    img.src = zoomCache[idx];
  } else {
    img.src = src;
    if (hiRes) {
      img.onload = () => { zoomCache[idx] = src; };
    }
  }

  if (!hiRes) renderHotspots(idx);
}

function preloadAerialImages() {
  const promises = [];
  for (let i = 1; i <= TOTAL_IMAGES; i++) {
    const src = getAerialPath(i, false);
    promises.push(new Promise(resolve => {
      const img = new Image();
      img.onload = () => resolve();
      img.onerror = () => resolve();
      img.src = src;
    }));
  }
  return Promise.all(promises);
}

function buildRowDots() {
  const container = document.getElementById('row-dots');
  container.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    const d = document.createElement('div');
    d.className = 'rdot' + (r === 0 ? ' active' : '');
    d.dataset.row = r;
    d.title = `Elevation ${r + 1}`;
    d.addEventListener('click', () => {
      currentRow = r;
      currentImg = imgIndex(currentRow, colFromImg(currentImg));
      loadAerialImage(currentImg);
      updateRowDots();
    });
    container.appendChild(d);
  }
}

function updateRowDots() {
  document.querySelectorAll('.rdot').forEach(d => {
    d.classList.toggle('active', parseInt(d.dataset.row) === currentRow);
  });
}

function colFromImg(idx) {
  return (idx - 1) % COLS;
}

// ============================================================
// HOTSPOTS ON AERIAL
// ============================================================
function renderHotspots(imgIdx) {
  const layer = document.getElementById('hotspot-layer');
  layer.innerHTML = '';
  if (!currentMeta || !currentMeta.hotspots) return;
  if (zoomLevel > 1) return;

  const aerialEl = document.getElementById('aerial-img');
  const bRect = aerialEl.getBoundingClientRect();

  // Image natural dimensions (720x1080 portrait)
  const natW = 720, natH = 1080;
  // Rendered dimensions (object-fit:contain)
  const rendered = containedImageRect(natW, natH, bRect.width, bRect.height);

  currentMeta.hotspots.forEach(hs => {
    const positions = Array.isArray(hs.positions) ? hs.positions : [];
    if (!positions.length) return;
    const pos = positions.find(p => p.exterior_image === imgIdx && p.detected);
    if (!pos) return;

    const btn = document.createElement('div');
    btn.className = 'hs-btn';

    // Scale pixel coords to rendered image size
    const scaleX = rendered.width  / natW;
    const scaleY = rendered.height / natH;
    const px = rendered.left + pos.pixel_x * scaleX;
    const py = rendered.top  + pos.pixel_y * scaleY;

    btn.style.left = px + 'px';
    btn.style.top  = py + 'px';

    btn.appendChild(createEyeIcon());
    btn.setAttribute('aria-label', hs.room_name);

    const tip = document.createElement('div');
    tip.className = 'hs-tooltip';
    tip.textContent = hs.room_name;
    btn.appendChild(tip);

    btn.addEventListener('click', () => enterRoom(hs));
    layer.appendChild(btn);
  });
}

function containedImageRect(natW, natH, dispW, dispH) {
  const scale = Math.min(dispW / natW, dispH / natH);
  const w = natW * scale;
  const h = natH * scale;
  return { left:(dispW-w)/2, top:(dispH-h)/2, width:w, height:h };
}

// Re-render hotspots when window resizes
window.addEventListener('resize', () => {
  if (zoomLevel <= 1) renderHotspots(currentImg);
  if (document.getElementById('mini-map').classList.contains('visible')) {
    renderMiniMapHotspots();
  }
});

// ============================================================
// DRAG NAVIGATION (AERIAL)
// ============================================================
const aerialEl = document.getElementById('aerial-view');

aerialEl.addEventListener('mousedown', onDragStart);
aerialEl.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    e.preventDefault();
    pinchStartDist = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY);
    pinchStartZoom = zoomLevel;
  } else if (e.touches.length === 1) {
    e.preventDefault();
    isTouchDrag = true;
    onDragStart(e.touches[0]);
  }
}, { passive: false });
window.addEventListener('mousemove', onDragMove);
window.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && pinchStartDist > 0) {
    e.preventDefault();
    const dist = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY);
    const scale = dist / pinchStartDist;
    let next = Math.round(pinchStartZoom * scale);
    next = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, next));
    if (next !== zoomLevel) {
      zoomLevel = next;
      if (zoomLevel === 1) {
        panOffsetX = 0;
        panOffsetY = 0;
        document.getElementById('zoom-bar').classList.remove('visible');
        document.getElementById('aerial-img').classList.remove('pan-mode');
        loadAerialImage(currentImg, false);
        renderHotspots(currentImg);
      } else {
        if (zoomLevel === 2) {
          document.getElementById('zoom-bar').classList.add('visible');
          document.getElementById('hotspot-layer').innerHTML = '';
          document.getElementById('hint').classList.add('gone');
          document.getElementById('aerial-img').classList.add('pan-mode');
        }
        loadAerialImage(currentImg, true);
      }
      applyZoomPan();
      updateZoomBadge();
      pinchStartZoom = zoomLevel;
      pinchStartDist = dist;
    }
    return;
  }
  if (e.touches.length === 1) pinchStartDist = 0;
  if (dragActive || panActive) e.preventDefault();
  if (e.touches && e.touches[0]) onDragMove(e.touches[0]);
}, { passive: false });
window.addEventListener('mouseup', onDragEnd);
window.addEventListener('touchend', e => {
  if (e.touches.length < 2) pinchStartDist = 0;
  if (e.touches.length === 0) isTouchDrag = false;
  onDragEnd();
});

aerialEl.addEventListener('dblclick', onDoubleClick);

aerialEl.addEventListener('wheel', onAerialWheel, { passive: false });

function onAerialWheel(e) {
  e.preventDefault();
  const delta = e.deltaY > 0 ? -1 : 1;
  const next = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, zoomLevel + delta));
  if (next !== zoomLevel) {
    zoomLevel = next;
    if (zoomLevel === 1) {
      panOffsetX = 0;
      panOffsetY = 0;
      document.getElementById('zoom-bar').classList.remove('visible');
      const img = document.getElementById('aerial-img');
      img.classList.remove('pan-mode');
      loadAerialImage(currentImg, false);
      renderHotspots(currentImg);
    } else {
      if (zoomLevel === 2) {
        document.getElementById('zoom-bar').classList.add('visible');
        document.getElementById('hotspot-layer').innerHTML = '';
        document.getElementById('hint').classList.add('gone');
        document.getElementById('aerial-img').classList.add('pan-mode');
      }
      loadAerialImage(currentImg, true);
    }
    applyZoomPan();
    updateZoomBadge();
  }
}

function onDragStart(e) {
  if (e && typeof e.preventDefault === 'function') e.preventDefault();
  if (zoomLevel > 1) {
    panActive = true;
    panStartX = e.clientX;
    panStartY = e.clientY;
    panBaseX  = panOffsetX;
    panBaseY  = panOffsetY;
    return;
  }
  dragActive   = true;
  dragStartX   = e.clientX;
  dragStartY   = e.clientY;
  dragImgStart = currentImg;
  dragRowStart = currentRow;
}

function onDragMove(e) {
  if (zoomLevel > 1 && panActive) {
    const dx = e.clientX - panStartX;
    const dy = e.clientY - panStartY;
    panOffsetX = panBaseX - dx;
    panOffsetY = panBaseY - dy;
    applyPan();
    return;
  }
  if (!dragActive) return;

  const dx = e.clientX - dragStartX;
  const dy = e.clientY - dragStartY;

  // Sensitivity: phone 50% faster (35px), desktop 53px per image step
  const sensitivity = isTouchDrag ? 35 : 53;

  // Horizontal → column
  let colDelta = -Math.round(dx / sensitivity);
  let newCol   = ((colFromImg(dragImgStart) + colDelta) % COLS + COLS) % COLS;

  // Vertical → row (inverted: drag up = higher row, drag down = lower row)
  let rowDelta = Math.round(dy / sensitivity);
  let newRow   = Math.max(0, Math.min(ROWS - 1, dragRowStart + rowDelta));

  const newIdx = imgIndex(newRow, newCol);
  if (newIdx !== currentImg || newRow !== currentRow) {
    currentImg = newIdx;
    currentRow = newRow;
    loadAerialImage(currentImg);
    updateRowDots();
  }
}

function onDragEnd() {
  if (zoomLevel > 1) { panActive = false; return; }
  dragActive = false;
}

// ============================================================
// ZOOM (1–5×, wheel + pinch + double-click; double-click to 3× then out)
// ============================================================
function applyZoomPan() {
  const wrap = document.getElementById('aerial-zoom-wrap');
  const img = document.getElementById('aerial-img');
  if (zoomLevel <= 1) {
    wrap.style.transform = 'scale(1) translate(0, 0)';
    img.style.objectPosition = '';
    return;
  }
  wrap.style.transform = `scale(${zoomLevel}) translate(${-panOffsetX / zoomLevel}px, ${-panOffsetY / zoomLevel}px)`;
}

function updateZoomBadge() {
  const badge = document.querySelector('.zoom-badge');
  if (badge) badge.textContent = zoomLevel + '× — Pan Mode';
}

function onDoubleClick(e) {
  if (zoomLevel > 1) {
    zoomLevel = 1;
    panOffsetX = 0;
    panOffsetY = 0;
    document.getElementById('zoom-bar').classList.remove('visible');
    document.getElementById('aerial-img').classList.remove('pan-mode');
    loadAerialImage(currentImg, false);
    renderHotspots(currentImg);
    applyZoomPan();
    return;
  }
  zoomLevel = DOUBLE_CLICK_ZOOM;
  panOffsetX = 0;
  panOffsetY = 0;
  document.getElementById('hotspot-layer').innerHTML = '';
  document.getElementById('hint').classList.add('gone');
  document.getElementById('zoom-bar').classList.add('visible');
  document.getElementById('aerial-img').classList.add('pan-mode');
  loadAerialImage(currentImg, true);
  applyZoomPan();
  updateZoomBadge();
}

function exitZoom() {
  zoomLevel = 1;
  panOffsetX = 0;
  panOffsetY = 0;
  document.getElementById('zoom-bar').classList.remove('visible');
  document.getElementById('aerial-img').classList.remove('pan-mode');
  loadAerialImage(currentImg, false);
  renderHotspots(currentImg);
  applyZoomPan();
}

function applyPan() {
  applyZoomPan();
}

// ============================================================
// ENTER ROOM (INTERIOR)
// ============================================================
function enterRoom(hotspot, preserveHeading) {
  if (!hotspot || !Array.isArray(hotspot.interior_images) || hotspot.interior_images.length === 0) return;
  currentHotspot = hotspot;
  currentVersion = 1;

  fadeTransition(() => {
    viewMode = 'interior';
    document.getElementById('aerial-view').classList.add('hidden');
    document.getElementById('map-view').classList.remove('visible');
    document.getElementById('interior-view').classList.add('visible');
    document.getElementById('back-btn').classList.add('visible');
    document.body.classList.add('interior-active');

    const label = document.getElementById('room-label');
    label.textContent = hotspot.room_name;
    label.classList.add('visible');

    buildVersionTabs(hotspot);
    loadVersion(hotspot, 1, preserveHeading === true);
    showMiniMap();
    startGazeMonitor();
    setTimeout(function() {
      if (document.getElementById('mini-map').classList.contains('visible')) renderMiniMapHotspots();
    }, 150);
    setTimeout(showInteriorTutorial, 500);
  });
}

// VERSION TABS
// ============================================================
function buildVersionTabs(hotspot) {
  const tabs = document.getElementById('version-tabs');
  tabs.innerHTML = '';
  const versions = hotspot.interior_images;
  if (!versions || versions.length < 2) {
    tabs.classList.remove('visible');
    return;
  }
  versions.forEach(v => {
    const btn = document.createElement('button');
    btn.className = 'vtab' + (v.version === 1 ? ' active' : '');
    btn.textContent = 'V' + v.version;
    btn.dataset.version = v.version;
    btn.addEventListener('click', () => {
      if (v.version === currentVersion) return;
      switchVersion(hotspot, v.version);
    });
    tabs.appendChild(btn);
  });
  tabs.classList.add('visible');
}

function switchVersion(hotspot, vNum) {
  fadeTransition(() => {
    currentVersion = vNum;
    document.querySelectorAll('.vtab').forEach(b => {
      b.classList.toggle('active', parseInt(b.dataset.version) === vNum);
    });
    // Get current yaw from pannellum to maintain viewing angle
    let currentYaw = 0;
    if (viewer) { try { currentYaw = viewer.getYaw(); } catch(e){} }
    loadVersion(hotspot, vNum, currentYaw);
  });
}

// ============================================================
// LOAD PANORAMA VERSION
// ============================================================
function normAngle(deg) {
  let d = deg % 360;
  if (d < 0) d += 360;
  return d;
}

function loadVersion(hotspot, vNum, preserveHeading) {
  const verData = hotspot.interior_images.find(v => v.version === vNum);
  if (!verData) return;

  // Build full image URL
  const imgUrl = bucketUrl(verData.image_path);

  // Build hotspots for navigation arrows
  const hotspotsCfg = {};
  if (hotspot.navigation_arrows) {
    hotspot.navigation_arrows.forEach((arrow, i) => {
      const targetHs = currentMeta.hotspots.find(h => h.hotspot_id === arrow.links_to_hotspot);
      if (!targetHs) return;
      hotspotsCfg[`nav_${i}`] = {
        pitch: arrow.pitch,
        yaw:   arrow.yaw,
        type:  'info',
        text:  targetHs.room_name,
        clickHandlerFunc: (evt, args) => {
          enterRoom(targetHs, true);
        },
        cssClass: 'nav-arrow-hs',
        createTooltipFunc: createNavArrow,
        createTooltipArgs: { name: targetHs.room_name }
      };
    });
  }

  // First entry: face North. When switching rooms: same angle from North.
  const trueNorth = typeof verData.true_north_degrees === 'number' ? verData.true_north_degrees : 0;
  let yaw;
  if (preserveHeading) {
    yaw = normAngle(trueNorth + headingOffset);
  } else {
    yaw = trueNorth;
    headingOffset = 0;
  }

  // Destroy previous viewer
  if (viewer) { try { viewer.destroy(); } catch(e){} viewer = null; }
  document.getElementById('pannellum-container').innerHTML = '';

  viewer = pannellum.viewer('pannellum-container', {
    type:            'equirectangular',
    panorama:        imgUrl,
    autoLoad:        true,
    showControls:    false,
    compass:         false,
    yaw:             yaw,
    pitch:           0,
    hfov:            100,
    minHfov:         60,
    maxHfov:         120,
    hotSpots:        Object.values(hotspotsCfg),
    backgroundColor: [10, 10, 10],
  });

  // Gaze detection
  if (viewer) {
    viewer.on('mousedown', trackGaze);
    viewer.on('touchstart', trackGaze);
  }
}

function createNavArrow(hotSpotDiv, args) {
  hotSpotDiv.classList.add('nav-arrow-hs');
  hotSpotDiv.innerHTML = `
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.2" xmlns="http://www.w3.org/2000/svg">
      <polygon points="12,3 22,21 12,17 2,21" fill="rgba(255,255,255,0.85)" stroke="none"/>
    </svg>`;
  const tip = document.createElement('div');
  tip.style.cssText = 'position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:rgba(10,10,10,0.9);border:1px solid #2a2a2a;color:#f0ede8;font-family:Courier,monospace;font-size:0.62rem;letter-spacing:0.15em;padding:3px 8px;white-space:nowrap;pointer-events:none;';
  tip.textContent = args.name;
  hotSpotDiv.appendChild(tip);
}

// ============================================================
// FLOOR-LOOK LOGO (GAZE DETECTION)
// ============================================================
function startGazeMonitor() {
  if (!logoConfig || !viewer) return;
  stopGazeMonitor();
  gazeTimer = setInterval(() => {
    try {
      const yaw = viewer.getYaw();
      if (currentHotspot) {
        const verData = currentHotspot.interior_images.find(v => v.version === currentVersion) || currentHotspot.interior_images[0];
        const trueNorth = verData && typeof verData.true_north_degrees === 'number' ? verData.true_north_degrees : 0;
        headingOffset = normAngle(yaw - trueNorth);
        updateMiniMapFov(trueNorth);
      }
    } catch(e) {}
  }, 200);
}

function stopGazeMonitor() {
  if (gazeTimer) { clearInterval(gazeTimer); gazeTimer = null; }
  document.getElementById('logo-overlay').classList.remove('visible');
}

function trackGaze() {
  // handled by interval
}

// ============================================================
// MAP + MINI MAP
// ============================================================
function openRooms() {
  if (!currentMeta || !currentMeta.map_image_path) return;
  viewMode = 'map';
  document.getElementById('aerial-view').classList.add('hidden');
  document.getElementById('map-view').classList.add('visible');
  document.getElementById('interior-view').classList.remove('visible');
  document.body.classList.remove('interior-active');
  document.getElementById('room-label').classList.remove('visible');
  document.getElementById('version-tabs').classList.remove('visible');
  document.getElementById('back-btn').classList.add('visible');
  document.getElementById('mini-map').classList.remove('visible');

  const img = document.getElementById('map-img');
  img.src = bucketUrl(currentMeta.map_image_path || `${projectName}/${currentFloor}/map.jpg`);
  img.onload = () => renderMapHotspotsFull();
}

function renderMapHotspotsFull() {
  const img = document.getElementById('map-img');
  const layer = document.getElementById('map-hotspot-layer');
  layer.innerHTML = '';
  if (!currentMeta || !currentMeta.hotspots) return;
  const rect = img.getBoundingClientRect();
  const natW = img.naturalWidth || rect.width;
  const natH = img.naturalHeight || rect.height;
  const rendered = containedImageRect(natW, natH, rect.width, rect.height);
  currentMeta.hotspots.forEach((hs, index) => {
    const { x: mx, y: my } = getMapCoords(hs);
    let px, py;
    if (!Number.isNaN(mx) && !Number.isNaN(my)) {
      const useNorm = (mx >= 0 && mx <= 1 && my >= 0 && my <= 1);
      const u = useNorm ? mx : (mx / natW);
      const v = useNorm ? my : (my / natH);
      px = rendered.left + u * rendered.width;
      py = rendered.top  + v * rendered.height;
    } else {
      const cols = Math.max(1, Math.min(4, currentMeta.hotspots.length));
      const row = Math.floor(index / cols);
      const col = index % cols;
      const rw = img.getBoundingClientRect().width || 800;
      const rh = img.getBoundingClientRect().height || 500;
      px = 40 + col * (rw / (cols + 1));
      py = 40 + row * 50;
    }
    const btn = document.createElement('div');
    btn.className = 'map-hs';
    btn.style.left = px + 'px';
    btn.style.top  = py + 'px';
    btn.appendChild(createEyeIcon());
    btn.setAttribute('aria-label', hs.room_name);
    btn.addEventListener('click', () => enterRoom(hs, false));
    layer.appendChild(btn);
  });
}

function setMinimapCollapsed(collapsed) {
  minimapCollapsed = collapsed;
  const wrap = document.getElementById('mini-map');
  wrap.classList.toggle('minimap-collapsed', collapsed);
  document.body.classList.toggle('minimap-collapsed', collapsed);
}

function showMiniMap() {
  if (!currentMeta || !currentMeta.map_image_path) return;
  const wrap = document.getElementById('mini-map');
  const img = document.getElementById('mini-map-img');
  wrap.classList.add('visible');
  wrap.classList.toggle('minimap-collapsed', minimapCollapsed);
  document.body.classList.toggle('minimap-collapsed', minimapCollapsed);
  img.src = bucketUrl(currentMeta.map_image_path || `${projectName}/${currentFloor}/map.jpg`);
  img.onload = () => {
    renderMiniMapHotspots();
    requestAnimationFrame(() => requestAnimationFrame(renderMiniMapHotspots));
  };
}

function getMapCoords(hs) {
  const x = hs.map_x ?? hs.mapX ?? hs.x;
  const y = hs.map_y ?? hs.mapY ?? hs.y;
  const nx = typeof x === 'number' ? x : (typeof x === 'string' ? parseFloat(x) : NaN);
  const ny = typeof y === 'number' ? y : (typeof y === 'string' ? parseFloat(y) : NaN);
  return { x: nx, y: ny };
}

function renderMiniMapHotspots() {
  const wrap = document.getElementById('mini-map');
  const img = document.getElementById('mini-map-img');
  const layer = document.getElementById('mini-map-hotspots');
  layer.innerHTML = '';
  if (!currentMeta || !currentMeta.hotspots) return;
  const natW = img.naturalWidth || 1;
  const natH = img.naturalHeight || 1;
  if (natW < 2 || natH < 2) return;
  /* Use fixed minimap content size so hotspot positions stay correct on phone when switching rooms/collapsed state */
  const content = document.getElementById('mini-map-content');
  const collapsed = wrap.classList.contains('minimap-collapsed');
  const wrapW = (!collapsed && content && content.offsetWidth) ? content.offsetWidth : 364;
  const wrapH = (!collapsed && content && content.offsetHeight) ? content.offsetHeight : 205;
  const rendered = containedImageRect(natW, natH, wrapW, wrapH);
  currentMeta.hotspots.forEach((hs, index) => {
    const { x: mx, y: my } = getMapCoords(hs);
    let px, py;
    if (!Number.isNaN(mx) && !Number.isNaN(my)) {
      const useNormalized = (mx >= 0 && mx <= 1 && my >= 0 && my <= 1);
      const u = useNormalized ? mx : (mx / natW);
      const v = useNormalized ? my : (my / natH);
      px = rendered.left + u * rendered.width;
      py = rendered.top  + v * rendered.height;
    } else {
      const cols = Math.max(1, Math.min(4, currentMeta.hotspots.length));
      const row = Math.floor(index / cols);
      const col = index % cols;
      px = 24 + col * (wrapW / (cols + 1));
      py = 24 + row * 40;
    }
    const btn = document.createElement('div');
    btn.className = 'mini-hs';
    btn.style.left = px + 'px';
    btn.style.top  = py + 'px';
    btn.appendChild(createEyeIcon());
    btn.setAttribute('aria-label', hs.room_name || 'Room');
    btn.addEventListener('click', () => enterRoom(hs, true));
    layer.appendChild(btn);
  });
  updateMiniMapFov();
}

function updateMiniMapFov(forceTrueNorth) {
  const fov = document.getElementById('mini-map-fov');
  if (viewMode !== 'interior') {
    fov.style.visibility = 'hidden';
    return;
  }
  fov.style.visibility = 'visible';
  if (!currentHotspot) return;
  const wrap = document.getElementById('mini-map');
  const img = document.getElementById('mini-map-img');
  if (!fov.querySelector('svg')) fov.appendChild(createFovRaySvg());
  const natW = img.naturalWidth || 1;
  const natH = img.naturalHeight || 1;
  const content = document.getElementById('mini-map-content');
  const collapsed = wrap.classList.contains('minimap-collapsed');
  const wrapW = (!collapsed && content && content.offsetWidth) ? content.offsetWidth : 364;
  const wrapH = (!collapsed && content && content.offsetHeight) ? content.offsetHeight : 205;
  const rendered = containedImageRect(natW, natH, wrapW, wrapH);
  const hs = currentHotspot;
  const { x: mx, y: my } = getMapCoords(hs);
  if (Number.isNaN(mx) || Number.isNaN(my)) return;
  const useNorm = (mx >= 0 && mx <= 1 && my >= 0 && my <= 1);
  const u = useNorm ? mx : (mx / natW);
  const v = useNorm ? my : (my / natH);
  const px = rendered.left + u * rendered.width;
  const py = rendered.top  + v * rendered.height;
  fov.style.left = px + 'px';
  fov.style.top  = py + 'px';
  const verData = hs.interior_images.find(v => v.version === currentVersion) || hs.interior_images[0];
  const trueNorth = typeof forceTrueNorth === 'number'
    ? forceTrueNorth
    : (verData && typeof verData.true_north_degrees === 'number' ? verData.true_north_degrees : 0);
  const mapNorth = currentMeta && typeof currentMeta.map_north_degrees === 'number' ? currentMeta.map_north_degrees : 0;
  /* Look direction on map (0°=north/up, 90°=east). Ray SVG at 0° points left; up = -90° in CSS. +180° to flip ray to match view. */
  const angle = normAngle((mapNorth + headingOffset) - 90 + 180);
  /* Middle-right of Ray icon at (px, py), then rotate */
  fov.style.transform = `translate(-100%, -50%) rotate(${angle}deg)`;
}
